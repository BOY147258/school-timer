<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>极速计时 - 校园体育计时器</title>
  <link rel="stylesheet" href="css/app.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>">
</head>
<body>
  <div id="app">
    <!-- 加载页面 -->
    <div id="loading">
      <div class="loading-content">
        <div class="loading-icon">🏃</div>
        <div class="loading-text">极速计时</div>
        <div class="loading-bar">
          <div class="loading-progress"></div>
        </div>
      </div>
    </div>

    <!-- 主界面 -->
    <div id="main" class="hidden">
      <!-- 顶部状态栏 -->
      <header class="top-bar">
        <div class="logo">⚡ 极速计时</div>
        <div class="sync-status" id="syncStatus">
          <span class="status-dot"></span>
          <span class="status-text">单机模式</span>
        </div>
      </header>

      <!-- 计时显示区 -->
      <div class="timer-section">
        <div class="timer-display" id="timerDisplay">00.00</div>
        <div class="timer-status" id="timerStatus">准备就绪</div>
      </div>

      <!-- 模式选择 -->
      <div class="mode-selector">
        <div class="mode-label">选择角色</div>
        <div class="mode-buttons">
          <button class="mode-btn active" data-mode="start" onclick="selectMode('start')">
            <div class="mode-icon">🔫</div>
            <div class="mode-name">发令端</div>
            <div class="mode-desc">控制起跑</div>
          </button>
          <button class="mode-btn" data-mode="finish" onclick="selectMode('finish')">
            <div class="mode-icon">🏁</div>
            <div class="mode-name">终点端</div>
            <div class="mode-desc">识别冲线</div>
          </button>
        </div>
      </div>

      <!-- 连接设置 -->
      <div class="connect-section" id="connectSection">
        <div class="section-title">📡 连接设置</div>
        <div class="connect-form">
          <input type="text" id="roomCode" placeholder="房间码" maxlength="6">
          <button class="btn btn-primary" id="connectBtn" onclick="toggleConnect()">
            连接
          </button>
        </div>
        <div class="connect-hint">输入另一台设备的房间码进行连接</div>
      </div>

      <!-- 设置面板 -->
      <div class="settings-section">
        <div class="section-title">⚙️ 比赛设置</div>

        <!-- 距离选择 -->
        <div class="setting-row">
          <div class="setting-label">距离</div>
          <div class="distance-pills">
            <button class="dist-pill" data-dist="60">60米</button>
            <button class="dist-pill active" data-dist="100">100米</button>
            <button class="dist-pill" data-dist="200">200米</button>
            <button class="dist-pill" data-dist="400">400米</button>
            <button class="dist-pill" data-dist="800">800米</button>
            <button class="dist-pill" data-dist="1000">1000米</button>
          </div>
        </div>

        <!-- 道次设置 -->
        <div class="setting-row">
          <div class="setting-label">道次</div>
          <div class="lane-control">
            <button class="lane-btn" onclick="changeLane(-1)">−</button>
            <span class="lane-count" id="laneCount">4</span>
            <button class="lane-btn" onclick="changeLane(1)">+</button>
          </div>
        </div>

        <!-- 发令方式 -->
        <div class="setting-row">
          <div class="setting-label">发令方式</div>
          <div class="start-mode-pills">
            <button class="start-mode-pill active" data-mode="manual" onclick="selectStartMode('manual')">
              🎯 手动
            </button>
            <button class="start-mode-pill" data-mode="audio" onclick="selectStartMode('audio')">
              🎤 声音
            </button>
            <button class="start-mode-pill" data-mode="countdown" onclick="selectStartMode('countdown')">
              ⏱️ 倒计时
            </button>
          </div>
        </div>
      </div>

      <!-- 运动员名单 -->
      <div class="athletes-section" id="athletesSection">
        <div class="section-title">👥 运动员</div>
        <div class="athletes-list" id="athletesList">
          <!-- 动态生成 -->
        </div>
      </div>

      <!-- 操作按钮 -->
      <div class="action-section">
        <button class="btn btn-start" id="btnStart" onclick="startRace()">
          🎯 开始计时
        </button>
        <button class="btn btn-stop hidden" id="btnStop" onclick="stopRace()">
          ⏹ 结束
        </button>
        <button class="btn btn-abort hidden" id="btnAbort" onclick="abortRace()">
          ↩️ 召回
        </button>
      </div>

      <!-- 成绩显示 -->
      <div class="results-section hidden" id="resultsSection">
        <div class="section-title">🏆 成绩</div>
        <div class="results-list" id="resultsList">
          <!-- 动态生成 -->
        </div>
        <div class="results-actions">
          <button class="btn btn-secondary" onclick="nextGroup()">下一组 ➡</button>
          <button class="btn btn-secondary" onclick="exportResults()">📥 导出</button>
        </div>
      </div>
    </div>

    <!-- 终点端全屏视图 -->
    <div id="finishView" class="hidden">
      <div class="finish-header">
        <div class="finish-title">🏁 终点端</div>
        <div class="finish-room" id="finishRoom">房间码: -</div>
      </div>
      <div class="finish-video-wrap">
        <video id="finishVideo" autoplay playsinline></video>
        <canvas id="finishCanvas"></canvas>
        <div class="finish-overlay" id="finishOverlay">
          <div class="finish-instruction">
            📷 将摄像头对准终点线
            <br>
            <small>调整位置使跑道清晰可见</small>
          </div>
        </div>
      </div>
      <div class="finish-status" id="finishStatus">
        <div class="status-indicator">🟢 等待发令</div>
      </div>
      <div class="finish-results" id="finishResults"></div>
      <div class="finish-actions">
        <button class="btn btn-primary" onclick="nextGroup()">下一组 ➡</button>
      </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
